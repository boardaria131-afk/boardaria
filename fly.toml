app = "hexforge-mp"
primary_region = "fra"   # Frankfurt — change to nearest region

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0   # 0 = free tier (sleeps when idle)

  # WebSocket support
  [http_service.concurrency]
    type = "connections"
    hard_limit = 500
    soft_limit = 400

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
