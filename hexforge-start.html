<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HexForge — Spielstart</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #07090c;
  --bg2:    #0d1018;
  --bg3:    #131822;
  --bg4:    #1a2030;
  --border: #252d40;
  --border2:#2f3a52;
  --text:   #c0ccd8;
  --dim:    #4a5a72;
  --gold:   #c8a84b;
  --goldd:  #7a6230;
  --A:      #3a8acc;
  --B:      #cc4a44;
}
* { box-sizing:border-box; margin:0; padding:0; }
body {
  background:var(--bg);
  color:var(--text);
  font-family:'Crimson Pro', Georgia, serif;
  min-height:100vh;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:24px;
  overflow-x:hidden;
}
body::before {
  content:'';
  position:fixed; inset:0; pointer-events:none;
  background:
    radial-gradient(ellipse 70% 50% at 20% 30%, rgba(58,138,204,.04) 0%, transparent 60%),
    radial-gradient(ellipse 50% 70% at 80% 70%, rgba(204,74,68,.04) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 50% 50%, rgba(200,168,75,.025) 0%, transparent 70%);
}

/* ── Title ──────────────────────────────────────── */
.title-wrap { text-align:center; margin-bottom:40px; position:relative; z-index:1; }
h1 {
  font-family:'Cinzel', serif; font-weight:900;
  font-size:3rem; letter-spacing:12px;
  color:var(--gold);
  text-shadow:0 0 40px rgba(200,168,75,.4), 0 0 80px rgba(200,168,75,.15);
}
h1 span { color:var(--dim); }
.subtitle {
  font-family:'Cinzel', serif; font-size:.65rem;
  letter-spacing:5px; color:var(--dim); text-transform:uppercase;
  margin-top:6px;
}

/* ── VS Layout ──────────────────────────────────── */
.vs-layout {
  display:grid;
  grid-template-columns:1fr 80px 1fr;
  gap:16px;
  width:100%; max-width:900px;
  align-items:start;
  position:relative; z-index:1;
}
.vs-divider {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding-top:120px;
  gap:8px;
}
.vs-text {
  font-family:'Cinzel',serif; font-size:1.4rem;
  color:var(--dim); letter-spacing:2px;
}
.vs-line {
  width:1px; height:60px;
  background:linear-gradient(to bottom, transparent, var(--border), transparent);
}

/* ── Player column ──────────────────────────────── */
.player-col {
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:8px;
  overflow:hidden;
}
.col-header {
  padding:14px 18px;
  display:flex; align-items:center; gap:10px;
  border-bottom:1px solid var(--border);
}
.col-dot {
  width:10px; height:10px; border-radius:50%; flex-shrink:0;
}
.col-header h2 {
  font-family:'Cinzel',serif; font-size:.8rem;
  letter-spacing:3px; font-weight:600;
}
.name-input {
  background:transparent; border:none;
  font-family:'Cinzel',serif; font-size:.8rem;
  letter-spacing:2px; color:var(--text);
  outline:none; flex:1; min-width:0;
}
.name-input::placeholder { color:var(--dim); }

/* ── Deck tabs inside column ────────────────────── */
.deck-tabs {
  display:flex; border-bottom:1px solid var(--border);
}
.dtab {
  flex:1; padding:8px 4px;
  font-family:'Cinzel',serif; font-size:.55rem;
  letter-spacing:2px; text-transform:uppercase;
  color:var(--dim); cursor:pointer;
  border:none; border-right:1px solid var(--border);
  background:transparent; transition:all .12s; text-align:center;
}
.dtab:last-child { border-right:none; }
.dtab:hover { background:var(--bg3); color:var(--text); }
.dtab.active { background:var(--bg4); }
.tab-count { font-size:.48rem; margin-top:1px; }

/* ── Deck preview ───────────────────────────────── */
.deck-preview { padding:14px 16px; min-height:220px; }
.deck-empty {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  height:180px; gap:8px;
  color:var(--dim); font-size:.72rem; text-align:center;
}
.deck-empty span { font-size:1.8rem; }
.deck-preview-list {
  display:flex; flex-direction:column; gap:3px;
  max-height:220px; overflow-y:auto;
}
.deck-preview-list::-webkit-scrollbar { width:3px; }
.deck-preview-list::-webkit-scrollbar-thumb { background:var(--border); }

.dp-entry {
  display:flex; align-items:center; gap:8px;
  padding:4px 7px; border-radius:3px;
  background:var(--bg3); border:1px solid var(--border);
}
.dp-color { width:3px; height:18px; border-radius:1px; flex-shrink:0; }
.dp-name  { flex:1; font-family:'Cinzel',serif; font-size:.55rem; color:var(--text); }
.dp-cost  { font-family:'Cinzel',serif; font-size:.58rem; color:var(--gold); }
.dp-cnt   { font-size:.5rem; color:var(--dim); min-width:14px; text-align:right; }

/* deck stats bar */
.deck-stats-bar {
  display:flex; gap:10px; padding:8px 16px;
  border-top:1px solid var(--border);
  font-size:.6rem; color:var(--dim);
  flex-wrap:wrap;
}
.dsb-item { display:flex; gap:4px; align-items:center; }
.dsb-val  { font-family:'Cinzel',serif; color:var(--text); }

/* ── Actions inside column ──────────────────────── */
.col-actions {
  padding:10px 14px; border-top:1px solid var(--border);
  display:flex; flex-direction:column; gap:6px;
}
.act-row { display:flex; gap:6px; }
.act {
  flex:1; font-family:'Cinzel',serif; font-size:.55rem;
  letter-spacing:1.5px; text-transform:uppercase;
  padding:7px 4px; border:1px solid var(--border);
  background:var(--bg3); color:var(--dim);
  cursor:pointer; border-radius:3px; text-align:center;
  transition:all .12s;
}
.act:hover { border-color:var(--border2); color:var(--text); }
.act.primary {
  border-color:var(--goldd); color:var(--gold);
  background:rgba(200,168,75,.08);
}
.act.primary:hover { background:rgba(200,168,75,.18); border-color:var(--gold); }

/* ── Starter cards ──────────────────────────────── */
.starter-row {
  display:flex; gap:6px; padding:0 14px 12px;
}
.sc-pill {
  flex:1; padding:8px 4px;
  background:var(--bg3); border:1px solid var(--border);
  border-radius:4px; cursor:pointer; text-align:center;
  transition:all .14s;
}
.sc-pill:hover { border-color:var(--border2); transform:translateY(-1px); }
.sc-pill.selected { border-color:var(--gold); background:rgba(200,168,75,.08); }
.sc-pill-icon { font-size:1.2rem; }
.sc-pill-name {
  font-family:'Cinzel',serif; font-size:.52rem;
  letter-spacing:1px; color:var(--text); margin-top:3px;
}
.sc-pill-sub { font-size:.5rem; color:var(--dim); margin-top:2px; }

/* ── Separator label ────────────────────────────── */
.sec-label {
  font-family:'Cinzel',serif; font-size:.52rem;
  letter-spacing:2.5px; text-transform:uppercase;
  color:var(--dim); padding:8px 14px 4px;
}

/* ── Bottom CTA ─────────────────────────────────── */
.bottom-cta {
  margin-top:24px; text-align:center;
  position:relative; z-index:1;
  display:flex; flex-direction:column; align-items:center; gap:8px;
}
.start-btn {
  font-family:'Cinzel',serif; font-size:.85rem;
  letter-spacing:5px; text-transform:uppercase;
  padding:14px 48px;
  border:1px solid var(--goldd); color:var(--gold);
  background:rgba(200,168,75,.1);
  cursor:pointer; border-radius:4px;
  transition:all .18s;
  box-shadow:0 0 30px rgba(200,168,75,.1);
}
.start-btn:hover {
  background:rgba(200,168,75,.22);
  border-color:var(--gold);
  box-shadow:0 0 50px rgba(200,168,75,.25);
  transform:translateY(-1px);
}
.start-btn:disabled {
  opacity:.35; cursor:not-allowed; transform:none;
}
.start-hint { font-size:.62rem; color:var(--dim); }

/* ── Toast ──────────────────────────────────────── */
#toast {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  background:var(--bg3); border:1px solid var(--border2);
  border-radius:4px; padding:8px 20px;
  font-family:'Cinzel',serif; font-size:.63rem;
  letter-spacing:2px; color:var(--gold);
  opacity:0; transition:opacity .2s; pointer-events:none; z-index:999;
}
#toast.show { opacity:1; }

/* ── Deckbuilder link ───────────────────────────── */
.builder-link {
  font-family:'Cinzel',serif; font-size:.58rem;
  letter-spacing:2px; color:var(--dim);
  cursor:pointer; text-decoration:none;
  border-bottom:1px solid var(--border);
  padding-bottom:1px; transition:color .12s;
}
.builder-link:hover { color:var(--gold); border-color:var(--goldd); }
</style>
</head>
<body>

<div class="title-wrap">
  <h1>HEX<span>FORGE</span></h1>
  <div class="subtitle">Strategie auf dem Hexfeld</div>
</div>

<!-- ── Two-player layout ─────────────────────────── -->
<div class="vs-layout">

  <!-- PLAYER A -->
  <div class="player-col" id="col-A">
    <div class="col-header">
      <div class="col-dot" style="background:var(--A)"></div>
      <input class="name-input" id="name-A" placeholder="Spieler A" maxlength="20">
    </div>

    <div class="starter-row" id="starters-A"></div>

    <div class="sec-label">— oder eigenes Deck —</div>
    <div class="deck-tabs" id="tabs-A"></div>

    <div class="deck-stats-bar" id="stats-A"></div>

    <div class="col-actions">
      <div class="act-row">
        <button class="act primary" onclick="openBuilder()">⊞ Deck Builder öffnen</button>
      </div>
    </div>
  </div>

  <!-- VS divider -->
  <div class="vs-divider">
    <div class="vs-line"></div>
    <div class="vs-text">VS</div>
    <div class="vs-line"></div>
  </div>

  <!-- PLAYER B -->
  <div class="player-col" id="col-B">
    <div class="col-header">
      <div class="col-dot" style="background:var(--B)"></div>
      <input class="name-input" id="name-B" placeholder="Spieler B" maxlength="20">
    </div>

    <div class="sec-label">Starter-Deck wählen</div>
    <div class="starter-row" id="starters-B"></div>

    <div class="sec-label">— oder eigenes Deck —</div>

    <div class="deck-preview" id="preview-B"></div>
    <div class="deck-stats-bar" id="stats-B"></div>

    <div class="col-actions">
      <div class="act-row">
        <button class="act primary" onclick="openBuilder()">⊞ Deck Builder öffnen</button>
      </div>
    </div>
  </div>

</div>

<!-- ── CTA ──────────────────────────────────────── -->
<div class="bottom-cta">

  <span class="start-hint" id="start-hint">Jeder Spieler braucht ein Deck mit mind. 10 Karten</span>
</div>

<div id="toast"></div>

// ── Color metadata ──────────────────────────────────────
const COLOR_META = {
  blue:    { label:'Blue',    land:'Lake',     hex:'#3a8acc', bg:'#0d1e3a', border:'#1a4a7a' },
  green:   { label:'Green',   land:'Forest',   hex:'#4a9e40', bg:'#0d1e0d', border:'#1a4a18' },
  red:     { label:'Red',     land:'Mountain', hex:'#cc4444', bg:'#2a0808', border:'#5a1818' },
  yellow:  { label:'Yellow',  land:'Desert',   hex:'#d4982a', bg:'#1e1408', border:'#5a3a10' },
  neutral: { label:'Neutral', land:'Any',      hex:'#8a9ab0', bg:'#111418', border:'#2a3040' },
};

const RARITY_META = {
  common:      { label:'Common',      color:'#8a9ab0' },
  exceptional: { label:'Exceptional', color:'#4a9e40' },
  epic:        { label:'Epic',        color:'#cc44ff' },
  legendary:   { label:'Legendary',   color:'#c8a84b' },
};

// ── Helpers ─────────────────────────────────────────────
function cardsByColor(color) { return Object.values(CARD_DB).filter(c => c.color === color); }
function cardsByType(type)   { return Object.values(CARD_DB).filter(c => c.type  === type);  }
function allCards()          { return Object.values(CARD_DB); }

</script>
<script>
// ══════════════════════════════════════════════════
//  CONSTANTS & STATE
// ══════════════════════════════════════════════════
const STARTERS = {
  tide: {
    name:'Gezeitenflut', icon:'🌊', sub:'Blau / Neutral',
    colors:['blue','neutral'],
    ids: [
      'triton_warrior','triton_warrior','triton_warrior',
      'triton_diver','triton_diver','triton_diver',
      'water_elemental','water_elemental',
      'ruby_fish','ruby_fish','ruby_fish',
      'gabrian_archon','gabrian_archon',
      'snowstorm_lancer','snowstorm_lancer',
      'shifting_tide','shifting_tide','shifting_tide',
      'gabrian_enchantment','gabrian_enchantment',
      'imperial_guard','imperial_guard',
      'hilltop_archer','hilltop_archer',
      'healing_song','healing_song',
      'wisdom','wisdom',
      'outland_ranger','outland_ranger',
    ]
  },
  forest: {
    name:'Ewiger Wald', icon:'🌿', sub:'Grün / Neutral',
    colors:['green','neutral'],
    ids: [
      'tiki_chieftain','tiki_chieftain','tiki_chieftain',
      'living_willow','living_willow','living_willow',
      'sagami_warrior','sagami_warrior','sagami_warrior',
      'deepwood_grizzly','deepwood_grizzly',
      'tiki_healer','tiki_healer',
      'elderwood_embrace','elderwood_embrace','elderwood_embrace',
      'wild_growth','wild_growth','wild_growth',
      'spirit_of_rebirth','spirit_of_rebirth',
      'imperial_guard','imperial_guard',
      'healing_song','healing_song',
      'wisdom','wisdom',
      'outland_ranger',
      'queens_guard',
      'walking_fortress',
    ]
  },
  storm: {
    name:'Wüstensturm', icon:'⚡', sub:'Rot / Gelb',
    colors:['red','yellow'],
    ids: [
      'flame_spitter','flame_spitter','flame_spitter',
      'underground_brigand','underground_brigand','underground_brigand',
      'axe_grinder','axe_grinder','axe_grinder',
      'shedim_brute','shedim_brute',
      'firebomb','firebomb','firebomb',
      'flame_burst','flame_burst','flame_burst',
      'keldran_soldier','keldran_soldier','keldran_soldier',
      'oradrim_templar','oradrim_templar',
      'windborne_emissary','windborne_emissary',
      'shaytan_demon','shaytan_demon',
      'soul_drain','soul_drain',
      'barbarian_ogre',
      'blazing_salamander',
    ]
  },
};

// One state object per player
const state = {
  A: { activeDeck:0, selectedStarter: null },
  B: { activeDeck:0, selectedStarter: null },
};

// Load decks saved by deck-builder
function loadSavedDecks() {
  try {
    const raw = sessionStorage.getItem('hf_decks');
    return raw ? JSON.parse(raw) : [[], [], []];
  } catch(e) { return [[],[],[]]; }
}

let savedDecks = loadSavedDecks();

// ══════════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  ['A','B'].forEach(p => {
    renderStarters(p);
    renderTabs(p);
    renderPreview(p);
  });
  updateStartBtn();
});

// ══════════════════════════════════════════════════
//  RENDER STARTERS
// ══════════════════════════════════════════════════
function renderStarters(p) {
  const row = document.getElementById(`starters-${p}`);
  row.innerHTML = Object.entries(STARTERS).map(([key, s]) => `
    <div class="sc-pill ${state[p].selectedStarter===key?'selected':''}"
         data-key="${key}" onclick="selectStarter('${p}','${key}')">
      <div class="sc-pill-icon">${s.icon}</div>
      <div class="sc-pill-name">${s.name}</div>
      <div class="sc-pill-sub">${s.sub}</div>
    </div>`).join('');
}

function selectStarter(p, key) {
  state[p].selectedStarter = key;
  // Load into deck slot 0 for this player
  savedDecks[p === 'A' ? 0 : 1] = [...STARTERS[key].ids];
  sessionStorage.setItem('hf_decks', JSON.stringify(savedDecks));
  state[p].activeDeck = p === 'A' ? 0 : 1;
  renderStarters(p);
  renderTabs(p);
  renderPreview(p);
  updateStartBtn();
  toast(`${STARTERS[key].name} für Spieler ${p} geladen`);
}

// ══════════════════════════════════════════════════
//  RENDER TABS
// ══════════════════════════════════════════════════
function renderTabs(p) {
  const container = document.getElementById(`tabs-${p}`);
  const tabMap    = p === 'A' ? [0,1,2] : [0,1,2]; // use same 3 deck slots
  container.innerHTML = tabMap.map(i => {
    const idx  = p === 'A' ? i : i;   // both players share slots 0-2 of savedDecks
    const cnt  = savedDecks[idx]?.length || 0;
    const active = (p === 'A' ? state.A.activeDeck : state.B.activeDeck) === i;
    return `
      <button class="dtab ${active?'active':''}" onclick="switchTab('${p}',${i})">
        Deck ${i+1}<br>
        <span class="tab-count">${cnt}/30</span>
      </button>`;
  }).join('');
}

function switchTab(p, idx) {
  if (p === 'A') state.A.activeDeck = idx;
  else           state.B.activeDeck = idx;
  state[p].selectedStarter = null; // deselect starter when switching manually
  renderTabs(p);
  renderPreview(p);
  renderStarters(p);
  updateStartBtn();
}

// ══════════════════════════════════════════════════
//  RENDER DECK PREVIEW
// ══════════════════════════════════════════════════
function getDeck(p) {
  const idx = p === 'A' ? state.A.activeDeck : state.B.activeDeck;
  return savedDecks[idx] || [];
}

function renderPreview(p) {
  const deck    = getDeck(p);
  const preview = document.getElementById(`preview-${p}`);
  const statsEl = document.getElementById(`stats-${p}`);

  if (!deck.length) {
    preview.innerHTML = `
      <div class="deck-empty">
        <span>🃏</span>
        Kein Deck — wähle einen Starter<br>oder öffne den Deck Builder
      </div>`;
    statsEl.innerHTML = '';
    return;
  }

  // Build count map
  const counts = {};
  deck.forEach(id => counts[id] = (counts[id]||0) + 1);
  const entries = Object.entries(counts).sort((a,b) => {
    const ca = CARD_DB[a[0]], cb = CARD_DB[b[0]];
    if (!ca || !cb) return 0;
    return ca.cost - cb.cost || ca.name.localeCompare(cb.name);
  });

  const colorMap = { blue:'#3a8acc', green:'#4a9e40', red:'#cc4444', yellow:'#d4982a', neutral:'#8a9ab0' };

  preview.innerHTML = `<div class="deck-preview-list">${
    entries.map(([id, cnt]) => {
      const c = CARD_DB[id];
      if (!c) return '';
      const col = colorMap[c.color] || '#8a9ab0';
      return `<div class="dp-entry">
        <div class="dp-color" style="background:${col}"></div>
        <span class="dp-name">${c.name}</span>
        <span class="dp-cost">${c.cost}◆</span>
        <span class="dp-cnt">×${cnt}</span>
      </div>`;
    }).join('')
  }</div>`;

  // Stats
  const n   = deck.length;
  const avg = n ? (deck.reduce((s,id) => s + (CARD_DB[id]?.cost||0), 0) / n).toFixed(1) : 0;
  const cols = [...new Set(deck.map(id => CARD_DB[id]?.color).filter(Boolean))];
  const icons = { blue:'🌊', green:'🌿', red:'🔥', yellow:'☀', neutral:'◆' };
  statsEl.innerHTML = `
    <div class="dsb-item"><span>Karten:</span><span class="dsb-val">${n}/30</span></div>
    <div class="dsb-item"><span>Ø Mana:</span><span class="dsb-val">${avg}</span></div>
    <div class="dsb-item"><span>Farben:</span><span class="dsb-val">${cols.map(c=>icons[c]||c).join(' ')}</span></div>`;
}

// ══════════════════════════════════════════════════
//  START BUTTON STATE
// ══════════════════════════════════════════════════
function updateStartBtn() {
  const deckA = getDeck('A');
  const deckB = getDeck('B');
  const ok    = deckA.length >= 10 && deckB.length >= 10;
  const btn   = document.getElementById('start-btn');
  const hint  = document.getElementById('start-hint');
  btn.disabled = !ok;

  if (!ok) {
    const missing = [];
    if (deckA.length < 10) missing.push(`Spieler A (${deckA.length}/10)`);
    if (deckB.length < 10) missing.push(`Spieler B (${deckB.length}/10)`);
    hint.textContent = `Noch zu wenig Karten: ${missing.join(' · ')}`;
  } else {
    hint.textContent = 'Bereit — drücke Start!';
  }
}

// ══════════════════════════════════════════════════
//  NAVIGATE TO BUILDER
// ══════════════════════════════════════════════════
function openBuilder() {
  window.location.href = 'hexforge-deckbuilder.html';
}

// ══════════════════════════════════════════════════
//  START GAME
// ══════════════════════════════════════════════════
function startGame() {
  const deckA = getDeck('A');
  const deckB = getDeck('B');

  if (deckA.length < 10) { toast('Spieler A braucht mind. 10 Karten!'); return; }
  if (deckB.length < 10) { toast('Spieler B braucht mind. 10 Karten!'); return; }

  const nameA = document.getElementById('name-A').value.trim() || 'Spieler A';
  const nameB = document.getElementById('name-B').value.trim() || 'Spieler B';

  // Shuffle decks before passing to engine
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length-1; i > 0; i--) {
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]] = [a[j],a[i]];
    }
    return a;
  }

  // Map Faeria card IDs → engine DB IDs where needed
  // Cards not in the legacy DB just get passed through;
  // the engine will render them using CARD_DB.
  const params = {
    nameA,
    nameB,
    deckA: shuffle(deckA),
    deckB: shuffle(deckB),
  };

  try {
    sessionStorage.setItem('hf_game_params', JSON.stringify(params));
  } catch(e) {}

  window.location.href = 'hexforge.html';
}

// ══════════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════════
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}
</script>
